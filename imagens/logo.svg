<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
    <defs>
        <!-- Filtro para o Sombreado 3D Delicado do "RJ" -->
        <filter id="shadow-rj" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.35" />
        </filter>

        <!-- Filtro para dar profundidade sutil no Símbolo da Psicologia -->
        <filter id="shadow-psi" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#144A81" flood-opacity="0.15" />
        </filter>

        <!-- Estrutura de UMA folha grega -->
        <g id="leaf-node">
            <!-- Caule lateral -->
            <path d="M 0,0 Q 8,-8 15,-15" fill="none" stroke="#D9E1E8" stroke-width="2"/>
            <!-- Folha Externa Longa -->
            <path d="M 0,0 C -15,-15 -20,-35 0,-50 C 10,-35 5,-15 0,0" fill="#D9E1E8"/>
            <!-- Folha Interna Curta -->
            <path d="M 15,-15 C 5,-25 10,-40 25,-50 C 30,-35 25,-20 15,-15" fill="#D9E1E8"/>
            <!-- Fruto do Louro (baga) em Dourado Suave -->
            <circle cx="8" cy="-5" r="3" fill="#C5A059" opacity="0.6"/>
        </g>

        <!-- Estrutura do Ramo Esquerdo (Meio Círculo) -->
        <g id="left-branch">
            <!-- Linha guia circular perfeita -->
            <path d="M 358.4,616.3 A 240 240 0 0 1 160,380 A 240 240 0 0 1 358.4,143.7" fill="none" stroke="#D9E1E8" stroke-width="2.5"/>
            <!-- Folhas distribuídas matematicamente ao longo do círculo -->
            <use href="#leaf-node" transform="rotate(80 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(60 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(40 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(20 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(0 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(-20 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(-40 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(-60 400 380) translate(160 380)"/>
            <use href="#leaf-node" transform="rotate(-75 400 380) translate(160 380)"/>
        </g>
    </defs>

    <!-- Fundo Totalmente Transparente -->
    <rect width="800" height="800" fill="transparent"/>

    <!-- COROA DE LOUROS CIRCULAR (Marca d'água clássica) -->
    <use href="#left-branch" />
    <use href="#left-branch" transform="translate(800, 0) scale(-1, 1)" /> <!-- Espelha perfeitamente para o lado direito -->

    <!-- SÍMBOLO DA PSICOLOGIA (Psi) - Azul Royal Vibrante e Imponente -->
    <text x="400" y="550" font-family="'Times New Roman', 'Baskerville', serif" font-size="560" fill="#144A81" text-anchor="middle" filter="url(#shadow-psi)">Ψ</text>

    <!-- CAMADA 1: RECORTE BRANCO DAS INICIAIS (Abre o espaço na letra Psi) -->
    <text x="400" y="445" font-family="'Didot', 'Playfair Display', 'Times New Roman', serif" font-size="190" font-weight="300" fill="none" stroke="#F8F9FA" stroke-width="22" text-anchor="middle" letter-spacing="6">RJ</text>

    <!-- CAMADA 2: INICIAIS "RJ" (Dourado, fonte delicada fina e efeito de sombra 3D) -->
    <text x="400" y="445" font-family="'Didot', 'Playfair Display', 'Times New Roman', serif" font-size="190" font-weight="300" fill="#C5A059" text-anchor="middle" letter-spacing="6" filter="url(#shadow-rj)">RJ</text>

    <!-- NOME DA CLÍNICA (Azul Vivo, base sólida) -->
    <text x="400" y="705" font-family="'Playfair Display', 'Didot', 'Times New Roman', serif" font-size="44" font-weight="bold" fill="#144A81" text-anchor="middle" letter-spacing="6">RJ PSICOTERAPIA</text>

    <!-- REGISTRO CRP (Dourado, legibilidade impecável) -->
    <text x="400" y="745" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="600" fill="#C5A059" text-anchor="middle" letter-spacing="8">CRP 06/104438</text>
</svg>
